name = "gastos-telegram-bot"
main = "src/index.ts"
compatibility_date = "2025-02-14"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[[d1_databases]]
binding = "DB"
database_name = "gastos-db"
database_id = "7706d50c-3888-44e2-a135-7c32737cff74"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "RATE_LIMITER"
id = "94df970c41314b6a8dc414a659cdaf13"

[[kv_namespaces]]
binding = "TRACES_KV"
id = "917ab96fbfe14175aac9c29ae9c019a2"

[[queues.producers]]
binding = "INGEST_QUEUE"
queue = "gastos-parse-queue"

[[queues.consumers]]
queue = "gastos-parse-queue"
max_batch_size = 1
max_batch_timeout = 0

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "gastos-media"

[vars]
APP_ENV = "prod"
ALLOWED_ORIGINS = "https://gastos-mini-app.pages.dev"
OPENAI_TRANSCRIBE_MODEL = "whisper-1"
OPENAI_VISION_MODEL = "gpt-4o-mini"

[[vectorize]]
binding = "VECTORIZE"
index_name = "gastos-vectors"

[triggers]
crons = ["0 * * * *"]
