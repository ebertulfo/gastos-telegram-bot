name = "gastos-telegram-bot"
main = "src/index.ts"
compatibility_date = "2025-02-14"
workers_dev = true

[[d1_databases]]
binding = "DB"
database_name = "gastos-db"
database_id = "7706d50c-3888-44e2-a135-7c32737cff74"
migrations_dir = "migrations"

[[queues.producers]]
binding = "INGEST_QUEUE"
queue = "gastos-parse-queue"

[[queues.consumers]]
queue = "gastos-parse-queue"

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "gastos-media"

[vars]
APP_ENV = "dev"
OPENAI_TRANSCRIBE_MODEL = "gpt-4o-mini-transcribe"
OPENAI_VISION_MODEL = "gpt-4.1-mini"
